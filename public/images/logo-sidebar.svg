<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="sbgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sphoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Phone Icon Circle -->
  <circle cx="22" cy="22" r="16" fill="url(#sphoneGrad)" opacity="0.95"/>
  <text x="22" y="29" text-anchor="middle" font-size="20" fill="white">&#128222;</text>

  <!-- Signal Waves -->
  <path d="M34 14 Q40 8 46 14" stroke="#4caf50" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M34 18 Q40 13 46 18" stroke="#4caf50" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- PROVISION -->
  <text x="54" y="20" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="800" fill="#ffffff" letter-spacing="2">PROVISION</text>

  <!-- AR CALLING -->
  <text x="54" y="36" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#4caf50" letter-spacing="1.5">AR CALLING</text>

  <!-- Tagline -->
  <text x="54" y="48" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#90caf9" letter-spacing="1">Practice Management System</text>

  <!-- Accent line -->
  <line x1="54" y1="39" x2="180" y2="39" stroke="#4caf50" stroke-width="0.8" opacity="0.4"/>
</svg>
