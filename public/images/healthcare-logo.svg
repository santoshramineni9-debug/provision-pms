<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="50%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Healthcare Cross -->
  <rect x="195" y="80" width="122" height="200" rx="18" fill="white" opacity="0.95"/>
  <rect x="106" y="150" width="300" height="122" rx="18" fill="white" opacity="0.95"/>
  <!-- Heart -->
  <path d="M256 310 C256 310, 170 268, 170 230 C170 205, 192 188, 216 188 C236 188, 250 200, 256 214 C262 200, 276 188, 296 188 C320 188, 342 205, 342 230 C342 268, 256 310, 256 310Z" fill="url(#green)"/>
  <!-- PROVISION text -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="56" fill="white" letter-spacing="4">PROVISION</text>
  <!-- LMS subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="40" fill="#4caf50" letter-spacing="6">L M S</text>
  <!-- Decorative dots -->
  <circle cx="420" cy="60" r="6" fill="#4caf50" opacity="0.6"/>
  <circle cx="445" cy="60" r="4" fill="#4caf50" opacity="0.4"/>
  <circle cx="465" cy="60" r="3" fill="#4caf50" opacity="0.3"/>
</svg>
