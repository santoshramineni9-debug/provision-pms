<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a237e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bbdefb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="80" rx="10" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Phone Icon Circle -->
  <circle cx="36" cy="40" r="24" fill="url(#phoneGrad)" opacity="0.95"/>
  <text x="36" y="48" text-anchor="middle" font-size="26" fill="white">&#128222;</text>

  <!-- Signal Waves -->
  <path d="M58 30 Q66 20 74 30" stroke="#4caf50" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M58 36 Q66 28 74 36" stroke="#4caf50" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M58 42 Q66 36 74 42" stroke="#4caf50" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- PROVISION Text -->
  <text x="88" y="32" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="url(#textGrad)" letter-spacing="3" filter="url(#shadow)">PROVISION</text>

  <!-- AR CALLING Text -->
  <text x="88" y="56" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#4caf50" letter-spacing="2">AR CALLING</text>

  <!-- Tagline -->
  <text x="88" y="72" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#90caf9" letter-spacing="1.5">Practice Management System</text>

  <!-- Decorative Line -->
  <line x1="88" y1="60" x2="310" y2="60" stroke="#4caf50" stroke-width="1" opacity="0.4"/>

  <!-- Bottom accent dots -->
  <circle cx="320" cy="20" r="3" fill="#4caf50" opacity="0.6"/>
  <circle cx="332" cy="20" r="2" fill="#4caf50" opacity="0.4"/>
  <circle cx="340" cy="20" r="1.5" fill="#4caf50" opacity="0.3"/>
</svg>
